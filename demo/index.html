<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>DPlayer Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.loli.net/ajax/libs/github-markdown-css/5.8.1/github-markdown.min.css">
    <link rel="stylesheet" href="demo.css">
    <script src="https://cdnjs.loli.net/ajax/libs/flv.js/1.6.2/flv.min.js"></script>
    <script src="https://cdnjs.loli.net/ajax/libs/hls.js/1.6.9/hls.min.js"></script>
    <script src="https://cdnjs.loli.net/ajax/libs/dashjs/5.0.3/modern/umd/dash.all.min.js"></script>
    <script src="https://cdnjs.loli.net/ajax/libs/webtorrent/1.9.7/webtorrent.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pearplayer"></script>
    <script src="../dist/DPlayer.min.js"></script>
</head>

<body class="markdown-body">
    <h2>在 dialog 中承载视频</h2>
    <h3 id="dplayer-dialog" class="show-dialog">Show Dialog</h3>
    <div id="float-dplayer" class="float-dplayer">
        <div id="dplayer-container" class="dplayer-container"></div>
        <h3 id="close-dialog" class="close-dialog">X</h3>
    </div>

    <h2 id="quick-start">Quick Start</h2>
    <div class="example">
        <div id="dplayer1"></div>
    </div>

    <h2 id="options">Options</h2>
    <div class="example">
        <button class="btn" onclick="switchDPlayer()">Switch Video</button>
        <button class="btn" onclick="dp2.notice('Notice演示')">notice</button>
        <button class="btn" onclick="dp2.seek(120)">seek</button>
        <button class="btn" onclick="dp2.volume(0.2)">volume</button>
        <button class="btn" onclick="dp2.toggle()">toggle</button>
        <button class="btn" onclick="toggleDp2Muted()">toggle muted</button>
        <button class="btn" onclick="toggleDp2Loop()">toggle loop</button>
        <button class="btn" onclick="dp2.speed(1)">speed 1x</button>
        <button class="btn" onclick="dp2.speed(1.25)">speed 1.25x</button>
        <button class="btn" onclick="dp2.infoPanel.triggle()">info panel</button>
        <button class="btn" onclick="dp2.destroy()">destroy</button>
        <button class="btn" onclick="dp2.danmaku.hide()">danmaku.hide</button>
        <button class="btn" onclick="dp2.danmaku.show()">danmaku.show</button>
        <div class="debug-toolbar">
            <label class="debug-control" for="dp2-volume">
                <span>Volume</span>
                <input id="dp2-volume" type="range" min="0" max="1" step="0.01" value="0.2">
            </label>
            <label class="debug-control" for="dp2-rate">
                <span>Playback rate</span>
                <select id="dp2-rate">
                    <option value="0.5">0.5x</option>
                    <option value="0.75">0.75x</option>
                    <option value="1" selected>1x</option>
                    <option value="1.25">1.25x</option>
                    <option value="1.5">1.5x</option>
                    <option value="2">2x</option>
                </select>
            </label>
            <div id="debug-badges" class="debug-badges"></div>
        </div>
        <div id="dplayer2"></div>
        <div class="debug-panel">
            <div class="debug-panel-title">Debug snapshot</div>
            <div class="debug-panel-desc">实时查看 autoplay、muted、loop、volume、playbackRate 和媒体状态。</div>
            <dl id="debug-state" class="debug-state"></dl>
        </div>
        <div id="events"></div>
    </div>

    <h2 id="quality-switching">Quality switching</h2>
    <div class="example">
        <button class="btn" onclick="dp3.switchQuality(0)">Switch quality HD</button>
        <button class="btn" onclick="dp3.switchQuality(1)">Switch quality SD</button>
        <div id="dplayer3"></div>
    </div>

    <h2 id="hls-support">HLS support</h2>
    <div class="example">
        <div id="dplayer4"></div>
    </div>

    <h2 id="dash-support">MPEG DASH support</h2>
    <div class="example">
        <div id="dplayer8"></div>
    </div>

    <h2 id="flv-support">FLV support</h2>
    <div class="example">
        <div id="dplayer5"></div>
    </div>

    <h2 id="webtorrent">WebTorrent</h2>
    <div class="example">
        <div id="dplayer9"></div>
    </div>

    <h2 id="live">Live</h2>
    <div class="example">
        <button class="btn" onclick="dp6.danmaku.draw({text: '假装收到 WebSocket 弹幕', color: '#fff', type: 'right'})">假装收到 WebSocket 弹幕</button>
        <div id="dplayer6"></div>
    </div>

    <h2 id="custon-type">Custon video type</h2>
    <div class="example">
        <div id="dplayer10"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/stats.js"></script>
    <script src="demo.js"></script>
</body>

</html>
